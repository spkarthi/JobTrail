name: Copilot PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Request Copilot Review
        uses: github/copilot-review-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
